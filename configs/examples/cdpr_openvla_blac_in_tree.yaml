project:
  name: cdpr_openvla_blac_in_tree
  output_root: ../../runs
  python_executable: python3

repos:
  openvla_oft: /root/repo/openvla-oft
  dataset_repo: ../../robots/cdpr
  embodiment_repo: ../../robots/cdpr

remote:
  conda_env_file: ../../environments/openvla-oft-remote.yaml
  env_vars:
    MUJOCO_GL: egl
    PYOPENGL_PLATFORM: egl
    PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    TOKENIZERS_PARALLELISM: "false"
  notes:
    - In-tree OpenVLA BLAC example using the local actor-critic stack instead of the external PPO trainer.
    - Remote server path expects `openvla-oft` at `/root/repo/openvla-oft`.
    - Update `training.rl.args.adapter-path` and `training.rl.args.action-head-path` to real checkpoints before running.

assets:
  bundles:
    - name: ycb
      kind: asset
      source_path: ../../../../repo/CDPR-Dataset/cdpr_dataset/external_assets/ycb_dataset/ycb
      target_path: ../../assets/externals/ycb
      required: true
      description: YCB object meshes and MJCFs used by CDPR randomized scenes.
    - name: libero
      kind: asset
      source_path: ../../../../repo/LIBERO/libero/libero/assets
      target_path: ../../assets/externals/libero
      required: true
      description: LIBERO scene XMLs, textures, and scanned/stable object assets.
    - name: robotwin2
      kind: benchmark_repo
      source_path: ../../../../RoboTwin2.0
      target_path: ../../benchmarks/externals/robotwin2
      required: false
      description: Optional benchmark workspace for RoboTwin 2.0 evaluation.
    - name: robotwin2_assets
      kind: asset
      source_path: ../../../../RoboTwin2.0/assets
      target_path: ../../assets/externals/robotwin2_assets
      required: false
      description: Optional RoboTwin 2.0 scene/object assets for additional object pools.
    - name: desk_textures_cache
      kind: asset
      source_path: ../../../../repo/CDPR-Dataset/cdpr_dataset/wrappers/_desk_textures
      target_path: ../../assets/externals/desk_textures_cache
      required: false
      description: Optional CDPR desk texture cache for randomized scenes.

embodiment:
  name: cdpr_5dof
  kind: mujoco
  robot_root: ../../robots/cdpr/cdpr_mujoco
  xml_path: ../../robots/cdpr/cdpr_mujoco/cdpr.xml
  dof: 5
  extra_python_paths:
    - ../../robots/cdpr
    - /root/repo/openvla-oft
  cameras:
    overview: overview
    wrist: ee_camera
  controller:
    file: ../../robots/cdpr/cdpr_mujoco/headless_cdpr_egl.py
    class_name: HeadlessCDPRSimulation
    init_kwargs:
      output_dir: "{run_dir}"
    method_map:
      initialize: initialize
      step: run_simulation_step
      cleanup: cleanup
      capture_frame: capture_frame
    frame_buffers:
      overview: overview_frames
      wrist: ee_camera_frames
    camera_handles:
      overview: overview_cam
      wrist: ee_cam
    preview_steps: 1
  action_adapter:
    common_action_keys: [x, y, z, yaw, gripper]
    controller_scales:
      x: 0.015
      y: 0.015
      z: 0.015
      yaw: 0.08
      gripper: 1.0
    controller_limits:
      x: [-0.8, 0.8]
      y: [-0.8, 0.8]
      z: [0.08, 1.2]
      yaw: [-3.141592653589793, 3.141592653589793]
      gripper: [0.0, 0.03]
    open_gripper_threshold: -0.2
    close_gripper_threshold: 0.2

task:
  instruction_types: [move_up, move_down, move_left, move_right, move_top, move_bottom, move_center]
  target_objects: [ycb_apple, ycb_banana, ycb_pear, ycb_peach, bowl, plate, ycb_baseball, ycb_lemon, ycb_fork, ycb_hammer, ycb_spoon]
  reward:
    file: ../../robots/cdpr/cdpr_dataset/rl_instruction_tasks.py
    function: compute_instruction_reward
  metadata:
    zero_demo_first: true
    scene_object_pool: [ycb_apple, ycb_banana, ycb_pear, ycb_peach, bowl, plate, ycb_baseball, ycb_lemon, ycb_fork, ycb_hammer, ycb_spoon]
    min_scene_objects: 1
    max_scene_objects: 3
    scene_variant_count: 64
    goal_center_xy: [0.0, 0.0]
    goal_height_above_table: 0.10
    lateral_goal_offset: 0.40
    vertical_goal_offset: 0.10

simulation:
  entrypoint:
    file: ../../robots/cdpr/cdpr_dataset/generate_cdpr_dataset.py
    function: build_wrapper_if_needed
  preview_scene: desk
  preview_objects: [ycb_apple]
  catalog_path: ../../robots/cdpr/cdpr_dataset/datasets/cdpr_scene_catalog.yaml
  object_roots:
    - ../../assets/externals/ycb
    - ../../assets/externals/libero/stable_hope_objects
    - ../../assets/externals/libero/stable_scanned_objects
    - ../../assets/externals/robotwin2_assets
  desk_textures_dir: ../../assets/externals/desk_textures_cache
  desk_textures_fallback_dir: ../../assets/externals/libero/textures
  build_kwargs:
    scene_z: -0.85
    table_z: 0.15
    settle_time: 0.0
    ee_start: [0.0, 0.0, 0.40]
  randomization:
    random_scene_count: 100
    max_objects: 3
    use_domain_randomization: true

policy:
  type: openvla_oft
  repo_path: /root/repo/openvla-oft
  base_checkpoint: openvla/openvla-7b
  rl_script: /root/repo/openvla-oft/vla-scripts/ppo_finetune_cdpr.py
  sft_script: /root/repo/openvla-oft/vla-scripts/finetune.py
  action_head: L1RegressionActionHead
  num_images_in_input: 2
  action_codec:
    chunk_size: 8
    normalized_low: -1.0
    normalized_high: 1.0
    quantization:
      enabled: true
      bins: 256
    export_filename: openvla_action_codec.json

training:
  preview_before_rl: true
  rl:
    enabled: true
    algorithm: blac
    script_path: ../../rl_vla_bootstrapping/policy/openvla_blac_finetune_cdpr.py
    args:
      # The in-tree OpenVLA BLAC trainer needs the bootstrap config path explicitly.
      config: ../RL_VLA_Bootstrapping/configs/examples/cdpr_openvla_blac_in_tree.yaml

      # Point these to a real adapter directory and initial action-head checkpoint.
      adapter-path: /root/repo/openvla-oft/checkpoints/bootstrap_seed_adapter
      action-head-path: /root/repo/openvla-oft/checkpoints/bootstrap_seed_action_head.pt

      base-ckpt: openvla/openvla-7b
      center_crop: true
      freeze_vla_backbone: true
      num_images_in_input: 2
      chunk_length: 8
      device: cuda

      max_episodes: 40
      max_env_steps: 100
      save_every_episodes: 5
      replay_size: 4000
      batch_size: 4
      update_after: 64
      updates_per_episode: 10
      policy_delay: 2

      gamma: 0.99
      gamma_c: 0.99
      tau: 0.01
      actor_lr: 1.0e-4
      critic_lr: 3.0e-4
      dynamics_lr: 3.0e-4
      lyapunov_lr: 3.0e-4
      constraint_lr: 1.0e-2
      hidden_dim: 512
      critic_hidden_dim: 1024
      exploration_noise: 0.10
      target_policy_noise: 0.10
      target_noise_clip: 0.25
      eta: 0.25
      beta: 0.10
      rho_init: 1.0
      rho_growth: 1.01
      rho_max: 100.0
      object_clearance: 0.0
      enable_backup_controller: true
      backup_goal_gain: 0.5

      action_step_xyz: 0.015
      action_step_yaw: 0.08
      hold_steps: 10
      lock_non_commanded_axes: true
      lock_non_commanded_axes_threshold: 0.05
      randomize_ee_start: true
      ee_start_x_bounds: [-0.25, 0.25]
      ee_start_y_bounds: [-0.25, 0.25]
      workspace_x_bounds: [-0.8, 0.8]
      workspace_y_bounds: [-0.8, 0.8]
      workspace_z_bounds: [0.08, 0.60]
      wrapper_cleanup: false
      use_wrapper_cache: true
      capture_frames: false
  sft:
    enabled: false

evaluation:
  benchmarks:
    - name: robotwin2
      enabled: false
